name: RizeMobile
options:
  bundleIdPrefix: com.rizeclone
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 7.0.0

targets:
  RizeMobile:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/RizeMobile
    dependencies:
      - package: GRDB
        product: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rizeclone.mobile
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/RizeMobile/App/Info.plist
      properties:
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false

    # --------------------------------------------------------------------
    # Placeholder: DeviceActivity / FamilyControls extension targets
    # --------------------------------------------------------------------
    # Once the `com.apple.developer.family-controls` entitlement is
    # approved by Apple (see RIZ-20), this target and two additional
    # extension targets will be added here:
    #
    #   RizeMobileReportExtension (DeviceActivityReport, Tier A - exact,
    #     display-only, network/file isolated per architecture-mobile.md)
    #   RizeMobileMonitorExtension (DeviceActivityMonitor, Tier B -
    #     approximate, threshold events written to the App Group)
    #
    # Both extensions and the main app target will need:
    #   entitlements:
    #     com.apple.developer.family-controls: true
    #     com.apple.security.application-groups:
    #       - group.com.rizeclone.shared
    #
    # See ../documentation/architecture-mobile.md for the three-tier model
    # and ../documentation/security.md for entitlement/sandboxing details.
    # --------------------------------------------------------------------

  RizeMobileTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests/RizeMobileTests
    settings:
      base:
        SWIFT_VERSION: "5.10"
    dependencies:
      - target: RizeMobile
      - package: GRDB
        product: GRDB

schemes:
  RizeMobile:
    build:
      targets:
        RizeMobile: all
        RizeMobileTests: [test]
    test:
      targets:
        - RizeMobileTests
    run:
      config: Debug
