name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  # RIZ-47/RIZ-66: minimum acceptable app-target line coverage, percent.
  # Raise this over time as coverage improves; keep it as the single knob
  # for the gate.
  COVERAGE_THRESHOLD: 90

jobs:
  build-and-test:
    runs-on: macos-15
    # RIZ-66: a full run (build + test + lint + release build) normally
    # completes in ~5-8 minutes; a hung test (e.g. an unbounded wait on a
    # condition a bug never satisfies) would otherwise burn macOS runner
    # minutes — billed at a higher multiplier than Linux — for hours.
    # Bounds that failure mode to a fast, cheap failure instead.
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator destination
        id: simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -m1 -E "iPhone (1[5-9]|[2-9][0-9])" | sed -E 's/^[[:space:]]*//; s/ \(.*$//')
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/^[[:space:]]*//; s/ \(.*$//')
          fi
          echo "Using simulator: $DEVICE"
          echo "name=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          xcodebuild build \
            -project RizeMobile.xcodeproj \
            -scheme RizeMobile \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project RizeMobile.xcodeproj \
            -scheme RizeMobile \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Coverage gate
        run: scripts/coverage-check.sh TestResults.xcresult

      - name: Append coverage summary
        if: always()
        run: |
          if [ -f coverage-summary.txt ]; then
            {
              echo "## Coverage report (RizeMobile)"
              echo ""
              echo '```'
              cat coverage-summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ github.sha }}
          path: |
            coverage-report.txt
            coverage-report.json
          if-no-files-found: warn

      - name: Post coverage summary on PR
        if: always() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: coverage-report
          path: coverage-summary.txt

      - name: SwiftLint
        run: swiftlint --strict

      - name: SwiftFormat lint
        run: swiftformat --lint .

      - name: Build unsigned Release build for simulator
        run: |
          xcodebuild build \
            -project RizeMobile.xcodeproj \
            -scheme RizeMobile \
            -configuration Release \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip unsigned .app artifact
        run: |
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app product found" >&2
            exit 1
          fi
          ditto -c -k --keepParent "$APP_PATH" RizeMobile-unsigned-simulator.zip

      - name: Upload unsigned .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RizeMobile-unsigned-simulator-${{ github.sha }}
          path: RizeMobile-unsigned-simulator.zip
          if-no-files-found: error
