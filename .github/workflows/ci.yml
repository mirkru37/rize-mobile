name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tooling
        run: brew install xcodegen swiftlint swiftformat

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Select simulator destination
        id: simulator
        run: |
          DEVICE=$(xcrun simctl list devices available | grep -m1 -E "iPhone (1[5-9]|[2-9][0-9])" | sed -E 's/^[[:space:]]*//; s/ \(.*$//')
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available | grep -m1 "iPhone" | sed -E 's/^[[:space:]]*//; s/ \(.*$//')
          fi
          echo "Using simulator: $DEVICE"
          echo "name=$DEVICE" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          xcodebuild build \
            -project RizeMobile.xcodeproj \
            -scheme RizeMobile \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild test \
            -project RizeMobile.xcodeproj \
            -scheme RizeMobile \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            CODE_SIGNING_ALLOWED=NO

      - name: SwiftLint
        run: swiftlint --strict

      - name: SwiftFormat lint
        run: swiftformat --lint .

      - name: Build unsigned Release build for simulator
        run: |
          xcodebuild build \
            -project RizeMobile.xcodeproj \
            -scheme RizeMobile \
            -configuration Release \
            -destination "platform=iOS Simulator,name=${{ steps.simulator.outputs.name }}" \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip unsigned .app artifact
        run: |
          APP_PATH=$(find build/Build/Products -maxdepth 2 -name "*.app" -type d -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "No .app product found" >&2
            exit 1
          fi
          ditto -c -k --keepParent "$APP_PATH" RizeMobile-unsigned-simulator.zip

      - name: Upload unsigned .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: RizeMobile-unsigned-simulator-${{ github.sha }}
          path: RizeMobile-unsigned-simulator.zip
          if-no-files-found: error
